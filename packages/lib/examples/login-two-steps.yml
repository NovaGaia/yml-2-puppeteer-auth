name: "Login deux étapes (ex: Okta)"

authentication:
  url: "https://example.com/login"
  steps:
    - action: waitForSelector
      selector: "input[type='text']"
    - action: fill
      selector: "input[type='text']"
      valueEnv: "LOGIN_VALUE"
    - action: click
      selector: "button[type='submit']"
    - action: waitForNavigation
    - action: waitForSelector
      selector: "input[type='password']"
    - action: fill
      selector: "input[type='password']"
      valueEnv: "PASS_VALUE"
    - action: click
      selector: "button[type='submit']"
    - action: waitForNavigation

verification:
  - type: localStorage
    key: "okta-token"
    required: true
  - type: url
    contains: "/dashboard"
    required: true

options:
  timeout: 30000
