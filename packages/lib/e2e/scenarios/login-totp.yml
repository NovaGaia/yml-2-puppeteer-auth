name: 'Keycloak - Login avec TOTP'

authentication:
  url: 'http://localhost:8080/realms/test-auth/protocol/openid-connect/auth?client_id=test-app&redirect_uri=http://localhost:3000/&response_type=code'
  steps:
    - action: waitForSelector
      selector: '#username'

    - action: fill
      selector: '#username'
      valueEnv: 'KC_USER_TOTP'

    - action: fill
      selector: '#password'
      valueEnv: 'KC_PASS'

    - action: click
      selector: '#kc-login'

    - action: waitForSelector
      selector: '#otp'

    - action: fill
      selector: '#otp'
      valueEnv: 'KC_TOTP_SECRET'
      valueType: totp

    - action: click
      selector: '#kc-login'

    - action: waitForNavigation

verification:
  - type: url
    contains: 'localhost:3000'
    required: true

options:
  timeout: 15000
